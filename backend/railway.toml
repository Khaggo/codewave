[build]
builder = "RAILPACK"
buildCommand = "if [ \"$PORT\" = \"3001\" ]; then npm run build:ecommerce; else npm run build:main; fi"
watchPatterns = [
  "/backend/**",
]

[deploy]
startCommand = "if [ \"$PORT\" = \"3001\" ]; then npm run start:ecommerce; else npm run start:main; fi"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
